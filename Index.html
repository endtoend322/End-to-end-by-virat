<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>END TO END OFFLINE TOOL BY VIRAT KING 👑</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffffff, #d6f0ff);
    overflow-x: hidden;
}

.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #cceeff, transparent),
                radial-gradient(circle at 80% 80%, #aaddff, transparent);
    z-index: -1;
}

.container {
    width: 90%;
    max-width: 950px;
    margin: 40px auto;
}

h1 {
    text-align: center;
    color: #007acc;
    margin-bottom: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    margin-bottom: 25px;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-6px);
}

label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input[type=range] {
    padding: 0;
}

.upload-area {
    margin-top: 15px;
    padding: 25px;
    border: 2px dashed #007acc;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.upload-area:hover {
    background: #f0faff;
}

.upload-area input {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: 0.3s;
}

.submit-btn {
    background: #007acc;
    color: white;
}

.submit-btn:hover {
    background: #005f99;
}

.cancel-btn {
    background: #ccc;
}

.start-btn {
    background: #005f99;
    color: white;
    margin-bottom: 10px;
}

.console-card {
    background: #f0faff;
}

.console {
    background: black;
    color: #00ff88;
    padding: 12px;
    height: 220px;
    overflow-y: auto;
    font-family: monospace;
    border-radius: 12px;
    font-size: 13px;
}

.footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #555;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<h1>🔵 END TO END OFFLINE BY VIRAT</h1>

<!-- TARGET SETTINGS -->
<div class="card">
<h2>🎯 Target Settings</h2>

<label>Chat / E2E ID</label>
<input type="text" id="chatId">

<label>Facebook Chat ID</label>
<input type="text" id="facebookId">

<label>Name Prefix</label>
<input type="text" id="namePrefix">

<label>Delay (Seconds)</label>
<input type="range" min="1" max="120" value="30" id="delayRange">
<span id="delayValue">30</span> seconds
</div>

<!-- COOKIE CONFIG -->
<div class="card">
<h2>🍪 Cookies Configuration</h2>

<label>Cookies Mode</label>
<select id="cookieMode">
<option>Single Cookie</option>
<option>Multiple Cookies (Upload TXT)</option>
</select>

<div class="upload-area">
Drag & Drop Cookie File (.txt)
<input type="file" accept=".txt">
</div>
</div>

<!-- MESSAGE CONFIG -->
<div class="card">
<h2>💬 Upload Message File</h2>

<div class="upload-area">
Drag & Drop Message File (.txt)
<input type="file" accept=".txt">
</div>
</div>

<!-- BUTTONS -->
<div class="buttons">
<button class="submit-btn" onclick="submitForm()">✅ Submit</button>
<button class="cancel-btn" onclick="cancelForm()">❌ Cancel</button>
</div>

<!-- LIVE CONSOLE -->
<div class="card console-card">
<h2>🖥 Live Console</h2>
<button class="start-btn" onclick="startAutomation()">🚀 Start Automation</button>
<div class="console" id="consoleOutput"></div>
</div>

<div class="footer">
All Rights Reserved © 2026 !!VIRAT KING 👑 
</div>

</div>

<script>
const delayRange = document.getElementById("delayRange");
const delayValue = document.getElementById("delayValue");
const consoleOutput = document.getElementById("consoleOutput");

delayRange.oninput = function() {
    delayValue.innerText = this.value;
};

function submitForm() {
    alert("Configuration Submitted Successfully ✅");
}

function cancelForm() {
    document.querySelectorAll("input").forEach(input => {
        if(input.type !== "range") input.value = "";
    });
    alert("Form Cleared ❌");
}

function log(message) {
    const line = document.createElement("div");
    line.textContent = "> " + message;
    consoleOutput.appendChild(line);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

function startAutomation() {
    consoleOutput.innerHTML = "";
    log("Automation Started...");
    
    let steps = [
        "Validating Inputs...",
        "Checking Cookie Mode...",
        "Loading Message File...",
        "Preparing WhatsApp Target...",
        "Preparing Facebook Target...",
        "Simulation Running...",
        "Automation Completed Successfully!"
    ];

    let i = 0;
    let interval = setInterval(() => {
        if (i < steps.length) {
            log(steps[i]);
            i++;
        } else {
            clearInterval(interval);
        }
    }, 1000);
}
</script>

</body>
</html>
